name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        type: string
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  guard:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        if: github.event.inputs.confirm != 'deploy'
        run: |
          echo "::error::You must type 'deploy' to confirm production deployment."
          exit 1

  deploy-api:
    name: Deploy API to Production
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config apps/api/fly.toml --app surewaka-api --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-workers:
    name: Deploy Workers to Production
    needs: guard
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --config workers/fly.toml --app surewaka-workers --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  migrate:
    name: Run Migrations (Production)
    needs: deploy-api
    if: github.event.inputs.skip_migrations != 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - run: doppler run --project surewaka-api --config prd -- pnpm --filter @surewaka/db db:migrate
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
